front:
  text: 後序黃帝著內經其憂天下後世可謂厚且至矣秦越人述難經以證之傷寒為病最大仲景廣而論之為萬世法至於內傷脾胃之病諸書雖有其説略而未詳我東垣先生作內外傷辨脾胃論以補之先生嘗閲內經所論四時皆以養胃氣為本宗氣之道納穀為寶蓋飲食入胃遊溢精氣上輸於脾脾氣散精上歸於肺沖和百脈頤養神明利關節通九竅滋志意者也或因飲食失節起居不時妄作勞役及喜怒悲愈傷胃之元氣使營運之氣減削不能輸精皮毛經絡故諸邪乘虛而入則痰動於體而成痼疾致真氣彌然而內消也病之所起初受熱中心火乘脾末傳寒中腎水反來侮土乃立初中末三治及君臣佐使之制經禁病禁時禁之則使學者知此病用此藥因心會通溯流得源遠溯軒岐吻合無間善乎魯齊先生之言曰東垣先生之學醫之王道也觀此書則可見矣至元丙子三月上巳日門生羅天益謹序

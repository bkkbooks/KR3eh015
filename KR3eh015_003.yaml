body:
  text: 卷下大腸小腸五臟皆屬於胃胃虛則俱病論黃帝針經云手陽明大腸手太陽小腸皆屬足陽明胃小腸之穴在巨虛下廉大腸之穴在巨虛上廉此二穴皆在足陽明胃三里穴下也大腸主津小腸主液大腸小腸受胃之榮氣乃能行津液於上焦溉灌皮毛充實腠理若飲食不節胃氣不及大腸小腸無所稟受故津液涸竭焉內經云耳鳴耳聾九竅不利腸胃之所生也此胃弱不以滋養手太陽小腸手陽明大腸故有此證然亦止從胃弱而得之故聖人混言腸胃之所生也或曰子謂混言腸胃所生亦有據乎豫應之曰玉機真臟論云脾不及令人九竅不通謂脾為死陰受胃之陽氣能上升水穀之氣於肺上充皮毛散入四臟今脾無所稟不能行氣於臟腑故有此證此則脾虛九竅不通之謂也雖言脾虛亦胃之不足所致耳此不言脾不言腸胃而言五臟者又何也豫謂此說與上二說無以異也蓋謂脾不受胃之稟命致五臟所主九竅不能上通天氣皆閉塞不利也故以五臟言之此三者止是胃虛所致耳然亦何止於此胃虛則五臟六腑十二經十五絡四肢皆不得營運之氣而百病生焉豈一端能盡之乎脾胃虛則九竅不通論真氣又名元氣乃先身生之精氣也非胃氣不能滋之胃氣者穀氣也榮氣也運氣也生氣也清氣也衛氣也陽氣也又天氣人氣地氣乃三焦之氣分而言之則異其實一也不當作異名異論而觀之飲食勞役所傷自汗小便數陰火乘土位清氣不生陽道不行乃陰血伏火況陽明胃土右燥左熱故化燥火而津液不能停且小便與汗皆亡津液津液至中宮變化為血也脈者血之府也血亡則七神何依百脈皆從此中變來也衆之百病莫大於中風有汗則風邪客之無汗則陽氣固密腠理閉拒諸邪不能傷也或曰經言陽不勝其陰則五臟氣爭九竅不通又脾不及則令人九竅不通名曰重強又五臟不和則九竅不通又頭痛耳鳴九竅不通利腸胃之所生也請析而解之答曰夫脾者陰土也至陰之氣主靜而不動胃者陽土也主動而不息陽氣在於地下乃能生化萬物故五運在上六氣在下其脾長一尺掩太倉太倉者胃之上口也脾受胃稟乃能熏蒸腐熟五穀者也胃者十二經之源水穀之海也平則萬化安病則萬化危五臟之氣上通九竅五臟稟受氣於六腑六腑受氣於胃六腑者在天為風寒暑濕燥火此無形之氣也胃氣和平榮氣上升始生溫熱濕熱者春夏也行陽二十五度六陽升散之極下而生陰陰降則下行為秋冬行陰道為寒涼也胃既受病不能滋養故六腑之氣已絶致陽道不行陰火上行五臟之氣各受一腑之化乃能滋養皮膚血脈筋骨故言五臟之氣已絶於外是六腑生氣先絶五臟無所稟受而氣後絶矣肺本收下又主五氣氣絶則下流與脾土疊於下焦故曰重強胃氣既病則下溜經云濕從下受之脾為至陰本乎地也有形之土下填九竅之源使不能上通於天故曰五臟不和則九竅不通胃者行清氣而上即地之陽氣也積陽成天曰清陽出上竅曰清陽實四肢曰清陽發腠理者也脾胃既為陰火所乘穀氣閉塞而下流即清氣不升九竅為之不利胃之一腑病則十二經元氣皆不足也氣少則津液不行津液不行則血虧故筋骨皮肉血脈皆弱是氣血俱羸弱矣勞役動作飲食飢飽可不慎乎凡有此病者雖不變易他疾已損其天年更加之針灸用藥差誤欲不夭枉得乎胃虛臟腑經絡皆無所受氣而俱病論夫脾胃虛則濕土之氣溜於臍下腎與膀胱受邪膀胱主寒腎為陰火二者俱弱潤澤之氣不行大腸者庚也燥氣也主津小腸者丙也熱氣也主液此皆屬胃胃虛則無所受氣而亦虛津液不濡睡覺口燥咽乾而皮毛不澤也甲膽風也溫也主生化周身之血氣丙小腸熱也主長養周身之陽氣亦皆稟氣於胃則能浮散也升發也胃虛則膽及小腸溫熱生長之氣俱不足伏留於有形血脈之中為熱病為中風其為病不可勝紀青赤黃白黑五腑皆滯三焦者乃下焦元氣生髮之根蒂為火乘之是六腑之氣俱衰也腑者腑庫之腑包含五臟及形質之物而藏焉且六腑之氣外無所主內有所受感天之風氣而生甲膽感暑氣而生丙小腸感濕化而生戊胃感燥氣而生庚大腸感寒氣而生壬膀胱感天一之氣而生三焦此實父氣無形也風寒暑濕燥火乃溫熱寒涼之別稱也行陽二十五度右遷而升浮降沉之化也其虛也皆由脾胃之弱以五臟論之心火亢甚乘其脾土曰熱中脈洪大而煩悶難經云脾病當臍有動氣按之牢若痛動氣築築然堅牢如有積而硬若似痛也甚則亦大痛有是則脾虛病也無則非也更有一辨食入則困倦精神昏冒而欲睡者脾虧弱也且心火大盛左遷入於肝木之分風濕相搏一身盡痛其脈洪大而弦時緩或為眩運戰搖或為麻木不仁此皆風也脾病體重即痛為痛痹為寒痹為諸濕痹為痿軟失力為大疽大癰若以辛熱助邪則為熱病為中風其變不可勝紀木旺運行北越左遷入地助其腎水水得子助入脾為痰涎自入為唾入肝為淚入肺為涕乘肝木而反克脾土明矣當先於陰分補其陽氣升騰行其陽道而走空竅次加寒水之藥降其陰火黃柏黃連之類是也先補其陽後瀉其陰脾胃俱旺而復於中焦之本位則陰陽氣平矣火曰炎上水曰潤下今言腎主五液上至頭出於空竅俱作泣涕汗涎唾者何也曰病癇者涎沫出於口冷汗出於身清涕出於鼻皆陽蹺陰蹺督沖四脈之邪上行腎水不任煎熬沸騰上行為之也此奇邪為病不繫五行陰陽十二經所拘當從督沖二蹺四穴中奇邪之法治之五臟外有所主內無所受謂無所受盛而外主皮毛血脈肌肉筋骨及各空竅是也若胃氣一虛脾無所稟受則四臟經絡皆病況脾全藉胃土平和則有所受而生榮周身四臟皆旺十二神守職皮毛固密筋骨柔和九竅通利外邪不能侮也胃虛元氣不足諸病所生論夫飲食勞役皆自汗乃足陽明化燥火津液不能停故汗出小便數也邪之大者莫若中風風者百病之長善行而數變雖然無虛邪則風雨寒不能獨傷人必先中虛邪然後賊邪得入矣至於痿厥逆皆由汗出而得之也且冬陽氣伏藏於水土之下如非常泄精陽氣已竭則春令從何而得萬化俱失所矣在人則飲食勞役汗下時出諸病遂生豫所以諄諄如此者蓋亦欲人知所慎也忽肥忽瘦論黃帝針經云寒熱少氣血上下行夫氣虛不能寒血虛不能熱血氣俱虛不能寒熱而胃虛不能上行則肺氣無所養故少氣衛氣既虛不能寒也下行乘腎肝助火為毒則陰分氣衰血虧故寒熱少氣血上下行者足陽明胃之脈衰則衝脈並陽明之脈上行於陽分逆行七十二度脈之火大旺逆陽明脈中血上行其血沖滿於上若火時退伏於下則血下行故言血上下行俗謂之忽肥忽瘦者是也經曰熱傷氣又曰壯火食氣故脾胃虛而火勝則必少氣不能衛護皮毛通貫上焦之氣而短少也陰分血虧陽分氣削陰陽之分周身血氣俱少不能寒熱故言寒熱也靈樞經云上焦開發宣五穀味熏膚充身澤毛若霧露之溉此則胃氣平而上行也天地陰陽生殺之理在升降浮沉之間論陰陽應象論云天以陽生陰長地以陽殺陰藏然歲以春為首正正也寅引也少陽之氣始於泉下引陰升而在天地人之上即天之分百穀草木皆甲坼於此時也至立夏少陰之火熾於太虛則草木盛茂垂枝布菜乃陽之用陰之體此所謂天以陽生陰長經言歲半以前天氣主之在乎升浮也至秋而太陰之運初自天而下逐陰降而徹地則金振燥令風厲霜飛品物咸殞其枝獨存若乎毫毛至冬則少陰之氣復伏於泉下水冰地坼萬類周密陰之用陽之體也此所謂地以陽殺陰藏經言歲半以後地氣主之在乎降沉也至於春氣溫和夏氣暑熱秋氣清涼冬氣冷洌此則正氣之序也故曰履端於始序則不愆升已而降降已而升如環無端運化萬物其實一氣也設或陰陽錯綜勝復之變自此而起萬物之中人一也呼吸升降效象天地準繩陰陽蓋胃為水穀之海飲食入胃而精氣先輸脾歸肺上行春夏之令以滋養周身乃清氣為天者也升已而下輸膀胱行秋冬之令為傳化糟粕轉味而出乃濁陰為地者也若夫順四時之氣起居有時以避寒暑飲食有節及不暴喜怒以頤神志常欲四時均平而無偏勝則安不然損傷脾胃真氣下溜或下泄而久不能升是有秋冬而無春夏乃生長之用陷於殞殺之氣而百病皆起或久升而不降亦病焉於此求之則知履端之義矣陰陽壽夭論五常政大論云陰精所奉其人壽陽精所降其人夭夫陰精所奉者上奉於陽謂春夏生長之氣也陽精所降者下降於陰謂秋冬收藏之氣也且如地之伏陰其精遇春而變動升騰於上即曰生髮之氣升極而浮即曰蕃秀之氣此六氣右遷於天乃天之清陽也陽主生故壽天之元陽其精遇秋而退降墜於下乃為收斂殞殺之氣降極而沉是為閉藏之氣此五運左遷入地乃地之濁陰也陰主殺故夭根於外者名曰氣立氣止則化絶根於內者名曰神機神去則機息皆不升而降也地氣者人之脾胃也脾主五臟之氣腎主五臟之精皆上奉於天二者俱主生化以奉升浮是知春生夏長皆從胃中出也故動止飲食各得其所必清必淨不令損胃之元氣下乘腎肝及行秋冬殞殺之令則亦合於天數耳五臟之氣交變論五臟別論云五氣入鼻藏於心肺難經云肺主鼻鼻和則知香臭潔古云視聽明而清涼香臭辨而溫暖此內受天之氣而外利於九竅也夫三焦之竅開於喉出於鼻鼻乃肺之竅此體也其聞香臭者用也心主五臭舍於鼻蓋九竅之用皆稟長生為近心長生於酉酉者肺故知臭為心之所用而聞香臭也耳者上通天氣腎之竅也乃腎之體而為肺之用蓋肺長生於子子乃腎之舍而肺居其中而能聽音聲也一說聲者天之陽音者天之陰在地為五律在人為喉之竅在口乃三焦之用肺與心合而為言出於口也此口心之竅開於舌為體三焦於肺為用又不可不知也肝之竅通於目離為火能耀光而見物故分別五色也肝為之舍腎主五精鼻藏氣於心肺故曰主百脈而行陽道經云脫氣者目盲脫精者耳聾心肺有病而鼻為之不利此明耳目口鼻為清氣所奉於天而心勞胃損則受邪也陰陽升降論易曰兩儀生四象乃天地氣交八卦是也在人則清濁之氣皆從脾胃出榮氣榮養周身乃水穀之氣味化之也清陽為天積陽成天地氣上為云天氣下為雨水穀之精氣也氣海也七神也元氣也父也清中清者清肺以助天真清陽出上竅耳目鼻口之七竅是也清中濁者榮華腠理清陽發腠理毛竅也清陽實四肢真氣充實四肢濁陰為地積陰成地云出天氣雨出地氣五穀五味之精是五味之化也血榮也維持神明也血之將會也母也濁中清者榮養於神降至中脘而為血故曰心主血心藏神濁陰出下竅前陰膀胱之竅也濁中濁者堅強骨髓濁陰走五臟散於五臟之血也養血脈潤皮膚肌肉筋者是也血生肉者此也濁陰歸六腑謂毛脈合精經氣歸於腑者是也天氣清靜光明者也藏德不止故不下也天明則日月不明邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不下交通不表萬物命故不施不施則名木多死惡氣不發風雨不節白露不下則菀藁不榮賊風數至暴雨數起天地四時不相保與道相失則未央絶滅唯聖人從之故身無苛病萬物不失生氣不竭此說人之不避大寒傷形大熱傷氣四時節候變更之異氣及飲食失節妄作勞役心生好惡皆令元氣不行氣化為火乃失生夭折之由耳調理脾胃治驗治法用藥若不明升降浮沉差互反損論豫病脾胃久衰視聽半失此陰盛乘陽加之氣短精神不足此由弦脈令虛多言之過皆陽氣衰弱不得舒伸伏匿於陰中耳癸卯歲六七月間淫雨陰寒逾月不止時人多病泄利濕多成五泄故也一日豫體重肢節疼痛大便泄並下者三而小便閉塞思其治法按內經標本論大小便不利無問標本先利大小便又云在下者引而竭之亦是先利小便也又云諸泄利小便不利先分別之又云治濕不利小便非其治也皆當利其小便必用淡味滲泄之劑以利之是其法也噫聖人之法雖布在方冊其不盡者可以求責耳今客邪寒濕之淫從外而入里以暴加之若從以上法度用淡滲之劑以除之病雖即已是降之又降是復益其陰而重竭其陽氣矣是陽氣愈削而精神愈短矣是陰重強而陽重衰矣反助其邪之謂也故必用升陽風藥即瘥以羌活獨活柴胡升麻各一錢防風根截半錢炙甘草根截半錢同㕮咀水四中盞煎至一盞去渣稍熱服大法云濕寒之勝助風以平之又曰下者舉之得陽氣升騰而去矣又法云客者除之是因曲而為之直也夫聖人之法可以類推舉一而知百病者若不達升降浮沉之理而一概施治其愈者幸也戊申六月初樞判白文舉年六十二素有脾胃虛損病目疾時作身面目睛俱黃小便或黃或白大便不調飲食減少氣短上氣怠惰嗜臥四肢不收至六月中目疾復作醫以瀉肝散下數行而前疾增劇豫謂大黃牽牛雖除濕熱而不能走經絡下咽不入肝經先入胃中大黃苦寒重虛其胃牽牛其味至辛能瀉氣重虛肺本嗽大作蓋標實不去本虛愈甚加之適當暑雨之際素有黃證之人所以增劇也此當於脾胃肺之本臟瀉外經中之濕熱制清神益氣湯主之而愈清神益氣湯茯苓升麻以上各二分澤瀉蒼朮防風以上各三分生薑五分此藥能走經除濕熱而不守故不瀉本臟補肺與脾胃本中氣之虛弱青皮一分橘皮生甘草白芍藥白朮以上各二分人參五分此藥皆能守本而不走經不走經者不滋經絡中邪守者能補臟之元氣黃柏一分麥門冬人參以上各二分五味子三分此藥去時令浮熱濕蒸上件如麻豆大都作一服水二盞煎至一盞去渣稍熱空心服火熾之極金伏之際而寒水絶體於此時也故急救之以生脈散除其濕熱以惡其太甚肺欲收心苦緩皆酸以收之心火盛則甘以瀉之故人參之甘佐以五味子之酸孫思邈云夏月常服五味子以補五臟氣是也麥門冬之微苦寒能滋水之源於金之位而清肅肺氣又能除火刑金之嗽而斂其痰邪復微加黃柏之苦寒以為守位滋水之流以鎮墜其浮氣而除兩足之痿弱也範天駷之內素有脾胃之證時顯煩躁胸中不利大便不通初冬出外而晚歸為寒氣怫鬱悶亂大作火不得升故也醫疑有熱治以疏風丸大便行而病不減又疑藥力小復加七八十丸下兩行前證仍不減復添吐逆食不能停痰唾稠黏湧出不止眼黑頭旋噁心煩悶氣短促上喘無力不欲言心神顛倒兀兀不止目不敢開如在風雲中頭苦痛如裂身重如山四肢厥冷不得安臥余謂前證乃胃氣已損復下兩次則重虛其胃而痰厥頭痛作矣製半夏白朮天麻湯主之而愈半夏白朮天麻湯黃柏二分乾薑三分天麻蒼朮白茯苓黃耆澤瀉人參以上各五分白朮炒曲以上各一錢半夏湯洗七次大麥糵面橘皮以上各一錢五分上件㕮咀每服半兩水二盞煎至一盞去渣帶熱服食前此頭痛苦甚謂之足太陰痰厥頭痛非半夏不能療眼黑頭旋風虛內作非天麻不能除其苗為定風草獨不為風所動也黃耆甘溫瀉火補元氣人參甘溫瀉火補中益氣二術俱苦甘溫除濕補中益氣澤苓利小便導濕橘皮苦溫益氣調中升陽曲消食蕩胃中滯氣大麥糵面寬中助胃氣乾薑辛熱以滌中寒黃柏苦大寒酒洗以主冬天少火在泉發躁也戊申有一貧士七月中病脾胃虛弱氣促憔悴因與人參芍藥湯人參芍藥湯麥門冬二分當歸身人參以上各三分炙甘草白芍藥黃耆以上各一錢五味子五個上件㕮咀分作二服每服用水二盞煎至一盞去渣稍熱服既愈繼而冬居曠室臥熱炕而吐血數次豫謂此人久虛弱附臍有形而有大熱在內上氣不足陽氣外虛當補表之陽氣瀉里之虛熱冬居曠室衣服復單薄是重虛其陽表有大寒壅遏裡熱火邪不得舒伸故血出於口因思仲景太陽傷寒一證當以麻黃湯發汗而不與之遂成衄血卻與之立愈與此甚同因與麻黃人參芍藥湯麻黃人參芍藥湯人參益三焦元氣不足而實其表也麥門冬以上各三分桂枝以補表虛當歸身和血養血各五分麻黃去其外寒炙甘草補其脾白芍藥黃耆以上各一錢五味子二個安其肺氣上件㕮咀都作一服水三盞煮麻黃一味令沸去沫至二盞入余藥同煎至一盞去渣熱服臨臥升陽散火湯治男子婦人四肢發熱肌熱筋痹熱骨髓中熱發困熱如燎捫之烙手此病多因血虛而得之或胃虛過食冷物抑遏陽氣於脾土火鬱則發之生甘草二錢防風二錢五分炙甘草三錢升麻葛根獨活白芍藥羌活人參以上各五錢柴胡八錢上件㕮咀每服稱半兩水三大盞煎至一盞去渣稍熱服忌寒涼之物及冷水月餘安胃湯治因飲食汗出日久心中虛風虛邪令人半身不遂見偏風痿痹之證當先除其汗慓悍之氣按而收之黃連揀淨去須五味子去子烏梅去核生甘草以上各五分熟甘草三分升麻梢二分上㕮咀分作二服每服水二盞煎至一盞去渣溫服食遠忌濕面酒五辛大料物之類清胃散治因服補胃熱藥而致上下牙痛不可忍牽引頭腦滿熱發大痛此足陽明別絡入腦也喜寒惡熱此陽明經中熱盛而作也真生地黃當歸身以上各三分牡丹皮半錢黃連揀淨六分如黃連不好更加二分如夏月倍之大抵黃連臨時增減無定升麻一錢上為細末都作一服水一盞半煎至七分去渣放冷服之清陽湯治口喎頰腮急緊胃中火盛必汗不止而小便數也紅花酒黃柏桂枝以上各一分生甘草蘇木以上各五分炙甘草一錢葛根一錢五分當歸身升麻黃耆以上各二錢上件㕮咀都作一服酒三大盞煎至一盞二分去渣稍熱服食前服訖以火尉摩緊結處而愈夫口喎筋急者是筋脈血絡中大寒此藥以代燔針劫刺破血以去其凝結內則泄衝脈之火熾胃風湯治虛風證能食麻木牙關急搐目內蠕瞤胃中有風獨面腫蔓荊子一分乾生薑二分草豆蔻黃柏羌活柴胡藁本以上各三分麻黃五分不去節當歸身蒼朮葛根以上各一錢香白芷一錢二分炙甘草一錢五分升麻二錢棗四枚上件銼如麻豆大分二服每服水二盞煎至一盞去渣熱服食後陽明病濕勝自汗論或曰濕之與汗陰乎陽乎曰西南坤土也脾胃也人之汗猶天地之雨也陰滋其濕則為霧露為雨也陰濕寒下行之地氣也汗多則亡陽陽去則陰勝也甚為寒中濕勝則音聲如從甕中出濕若中水也相家有說土音如居深甕中言其壅也遠也不出也其為濕審矣又知此二者一為陰寒也內經曰氣虛則外寒雖見熱中蒸蒸為汗終傳大寒知始為熱中表虛亡陽不任外寒終傳寒中多成痹寒矣色以候天脈以候地形者乃候地之陰陽也故以脈氣候之皆有形無形可見者也調衛湯治濕勝自汗補衛氣虛弱表虛不任外寒蘇木紅花以上各一分豬苓二分麥門冬三分生地黃三分半夏湯洗七次生黃芩生甘草當歸梢以上各五分羌活七分麻黃根黃耆以上各一錢五味子七枚上㕮咀如麻豆大作一服水二盞煎至一盞去渣稍熱服中風證必自汗汗多不得重發汗故禁麻黃而用根節也濕熱成痿肺金受邪論六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰以下痿軟癱不能動行走不正兩足欹側以清燥湯主之清燥湯黃連去須酒黃柏柴胡以上各一分麥門冬當歸身生地黃炙甘草豬苓曲以上各二分人參白茯苓上㕮咀如麻豆大每服半兩水二盞半煎至一盞去渣稍熱空心服助陽和血補氣湯治眼發後上熱壅白睛紅多眵淚無疼痛而癮澀難開此服苦寒藥太過而真氣不能通九竅也故眼昏花不明宜助陽和血補氣香白芷二分蔓荊子三分炙甘草當歸身酒洗柴胡以上各五分升麻防風以上各七分黃耆一錢上㕮咀都作一服水一盞半煎至一盞去渣熱服臨臥避風處睡忌風寒及食冷物升陽湯治大便一日三四次溏而不多有時泄瀉腹中鳴小便黃柴胡益智仁當歸身橘皮以上各三分升麻六分甘草二錢黃耆三錢紅花少許上㕮咀分作二服每服二大盞煎至一盞去渣稍熱服升陽除濕湯治脾胃虛弱不思飲食腸鳴腹痛泄瀉無度小便黃四肢困弱甘草大麥糵面如胃寒腹鳴者加陳皮豬苓以上各三分澤瀉益智仁半夏防風神麯升麻柴胡羌活以上各五分蒼朮一錢上㕮咀作一服水三大盞生薑三片棗二枚同煎至一盞去渣空心服益胃湯治頭悶勞動則微痛不喜飲食四肢怠惰躁熱短氣口不知味腸鳴大便微溏黃色身體昏悶口乾不喜食冷黃耆甘草半夏以上各二分黃芩柴胡人參益智仁白朮以上各三分當歸梢陳皮升麻以上各五分蒼朮一錢五分上㕮咀作一服水二大盞煎至一盞去渣稍熱服食前忌飲食失節生冷硬物酒濕面生薑和中湯治食不下口乾虛渴四肢困倦生甘草炙甘草以上各一分酒黃芩柴胡橘皮以上各二分升麻三分人參葛根藁本白朮以上各五分羌活七分蒼朮一錢生黃芩二錢上㕮咀作一服水二盞生薑五片棗二枚劈開同煎至一盞去渣稍熱服之食前強胃湯治因飲食勞役所傷腹脅滿悶短氣遇春口淡無味遇夏雖熱而惡寒常如飽不喜食冷物黃柏甘草以上各五分升麻柴胡當歸身陳皮以上各一錢生薑曲以上各一錢五分草豆蔻二錢半夏人參以上各三錢黃耆一兩上㕮咀每服三錢水二大盞煎至一盞去渣溫服食前溫胃湯專治服寒藥多致脾胃虛弱胃脘痛人參甘草益智仁縮砂仁厚朴以上各二分白豆蔻乾生薑澤瀉薑黃以上各三分黃耆陳皮以上各七分上件為極細末每服三錢水一盞煎至半盞溫服食前和中丸人參乾生薑橘紅以上各一錢乾木瓜二錢炙甘草三錢上為細末湯浸蒸餅為丸不進飲食如梧桐子大每服三五十丸溫水送下食前服藿香安胃散治脾胃虛弱不進飲食嘔吐不待腐熟藿香丁香人參以上各二錢五分橘紅五錢上件四味為細末每服二錢水一大盞生薑一片同煎至七分和渣冷服食前異功散治脾胃虛冷腹鳴腹痛自利不思飲食人參茯苓白朮甘草橘皮以上各五分上為粗散每服五錢水二大盞生薑三片棗二枚同煎至一盞去渣溫服食前先用數服以正其氣飲食傷脾論四十九難曰飲食勞倦則傷脾又云飲食自倍腸胃乃傷腸澼為痔夫脾者行胃津液磨胃中之谷主五味也胃既傷則飲食不化口不知味四肢倦困心腹痞滿兀兀欲吐而惡食或為飧泄或為腸澼此胃傷脾亦傷明矣大抵傷飲傷食其治不同傷飲者無形之氣也宜發汗利小便以導其濕傷食者有形之物也輕則消化或損其谷此最為妙也重則方可吐下今立數方區分類析以列於後五苓散治煩渴飲水過多或水入即吐心中淡淡停濕在內小便不利桂一兩茯苓豬苓白朮以上各一兩五錢澤瀉二兩五錢上為細末每服二錢熱湯調服不拘時候服訖多飲熱湯有汗出即愈如瘀熱在裡身發黃疸濃煎茵陳湯調下食前服之如疸發渴及中暑引飲亦可用水調服論飲酒過傷夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散汗出則愈矣其次莫如利小便二者乃上下分消其濕今之酒病者往往服酒症丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形陰血乖誤甚矣酒性大熱以傷元氣而復重瀉之況亦損腎水真陰及有形陰血俱為不足如此則陰血愈虛真水愈弱陽毒之熱大旺反增其陰火是以元氣消耗折人長命不然則虛損之病成矣酒疸下之久久為黑疸慎不可犯以葛花解酲湯主之葛花解酲湯治飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利蓮花青皮去穰三分木香五分橘皮去白人參去蘆豬苓去黑皮白茯苓以上各一錢五分神麯炒黃色澤瀉乾生薑白朮以上各二錢白豆蔻仁葛花砂仁以上各五錢上為極細末稱和勻每服三錢匕白湯調下但得微汗酒病去矣此蓋不得已而用之豈可恃賴日日飲酒此方氣味辛辣偶因酒病服之則不損元氣何者敵酒病也枳朮丸治痞消食強胃枳實麩炒黃色去穰一兩白朮二兩上同為極細末荷葉裹燒飯為丸如梧桐子大每服五十丸多用白湯下無時白朮者本意不取其食速化但令人胃氣強不復傷也橘皮枳朮丸治老幼元氣虛弱飲食不消臟腑不調心下痞悶枳實麩炒去穰橘皮以上各一兩白朮二兩上件為細末荷葉燒飯為丸如梧桐子大每服五十丸溫水送下食遠夫內傷用藥之大法所貴服之強人胃氣令胃氣益厚雖猛食多食重食而不傷此能用食藥者也此藥久久益胃氣令不復致傷也半夏枳朮丸治因冷食內傷半夏湯洗七次焙乾枳實麩炒黃色白朮以上各二兩上同為極細末荷葉裹燒飯為丸如梧桐子大每服五十丸添服不妨無定法如熱湯浸蒸餅為丸亦可如食傷寒熱不調每服加上二黃丸十丸白湯下更作一方加澤瀉一兩為丸有小便淋者用木香乾姜枳朮丸破除寒滯氣消寒飲食木香三錢乾薑五錢炮枳實一兩炒白朮一兩五錢上為極細末荷葉燒飯為丸如梧桐子大每服三五十丸溫水送下食前木香人參生薑枳朮丸開胃進食乾生薑二錢五分木香三錢人參三錢五分陳皮四錢枳實一兩炒黃白朮一兩五錢上為細末荷葉燒飯為丸如梧桐子大每服三五十丸溫水送下食前忌飽食和中丸治病久虛弱厭厭不能食而臟腑或祕或溏此胃氣虛弱也常服則和中理氣消痰去濕厚腸胃進飲食木香二錢五分枳實麩炒炙甘草以上各三錢五分檳榔四錢五分陳皮去白八錢半夏湯洗七次厚朴薑製以上各一兩白朮一兩二錢上為細末生薑自然汁浸蒸餅為丸如梧桐子大每服三五十丸溫水送下食前或食遠交泰丸升陽氣瀉陰火調營氣進飲食助精神寬腹中除怠惰嗜臥四肢不收沉困懶倦乾薑炮製三分巴豆霜五分人參去蘆肉桂去皮以上各一錢柴胡去苗小椒炒去汗並閉目去子白朮以上各一錢五分厚朴去皮銼炒秋冬加七錢酒煮苦楝白茯苓砂仁以上各三錢川烏頭炮去皮臍四錢五分知母四錢一半炒一半酒炒此一味春夏所宜秋冬去之吳茱萸湯洗七次五錢黃連去須秋冬減一錢五分皂角水洗煨去皮弦紫菀去苗以上各六錢上除巴豆霜另入外同為極細末煉蜜為丸如梧桐子大每服十丸溫水送下量虛實加減三稜消積丸治傷生冷硬物不能消化心腹滿悶丁皮益智以上各三錢巴豆炒和粳米炒焦黑去米茴香炒陳皮青橘皮以上各五錢京三稜炮廣朮炮炒曲以上各七錢上件為細末醋打麵糊為丸如梧桐子大每服十丸至二十丸溫生薑湯送下食前量虛實加減得更衣止後服備急丸治心腹百病卒痛如錐刺及脹滿不快氣急並治之錦紋川大黃為末乾薑炮為末巴豆先去皮膜心研如泥霜出油用霜上件三味等分同一處研勻煉蜜成劑臼內杵千百下丸如大豌豆大夜臥溫水下一丸如氣實者加一丸如卒病不計時候服婦人有孕不可服如所傷飲食在胸膈間兀兀欲吐反覆悶亂以物探吐去之神保丸治心膈痛腹痛血痛腎氣痛脅下痛大便不通氣噎宿食不消木香胡椒以上各二錢五分巴豆十枚去皮油心膜研乾蠍七枚上件四味為末湯浸蒸餅為丸麻子大硃砂三錢為衣每服五丸如心膈痛柿蒂燈心湯下如腹痛柿蒂煨姜煎湯下如血痛炒姜醋湯下如腎氣痛脅下痛茴香酒下如大便不通蜜調檳榔末一錢下如氣噎木香湯下如宿食不消茶酒漿飲任下雄黃聖餅子治一切酒食所傷心腹滿不快雄黃五錢巴豆一百個去油心膜白麵十兩重羅過上件三味內除白麵八九兩余藥同為細末共面和勻用新水和作餅子如手大以漿水煮煮至浮於水上漉出控旋看硬軟搗作劑丸如梧桐子大捻作餅子每服五七餅子加至十餅十五餅嚼破一餅利一行二餅利二行茶酒任下食前蠲飲枳實丸逐飲消痰導滯清膈枳實麥炒去穰半夏湯洗陳皮去白以上各二兩黑牽牛八兩內取頭末三兩上為細末水煮麵糊為丸如梧桐子大每服五十丸食後生薑湯下感應丸治虛中積冷氣弱有傷停積胃脘不能傳化或因氣傷冷因飢飽食飲酒過多心下堅滿兩脅脹痛心腹大疼霍亂吐瀉大便頻後重遲澀久痢赤白膿血相雜米穀不消愈而復發又治中酒嘔吐痰逆噁心喜唾頭旋胸膈痞悶四肢倦怠不欲飲食又治妊娠傷冷新産有傷若久有積寒吃熱藥不效者並悉治之又治久病形羸荏苒歲月漸致虛弱面黃肌瘦飲食或進或退大便或祕或泄不拘久新積冷並皆治之乾薑炮製一兩南木香去蘆丁香以上各一兩五錢百草霜二兩肉豆蔻去皮三十個巴豆去皮心膜油研七十個杏仁一百四十個湯浸去皮尖研膏上七味除巴豆粉百草霜杏仁三味餘四味搗為細末卻與三味同拌研令細用好蠟匱和先將蠟六兩溶化作汁以重綿濾去渣更以好酒一升於銀石器內煮蠟溶滾數沸傾出候酒冷其蠟自浮於上取蠟稱用丸春夏修合用清油一兩於銚內熬令沫散香熟次下酒煮蠟四兩同化作汁就鍋內乘熱拌和前項藥末秋冬修合用清油一兩五錢同煎煮熟作汁和匱藥末成劑分作小鍵子以油單紙裹之旋丸服耳神應丸治因一切冷物冷水及潼乳酪水所傷腹痛腸鳴米穀不化丁香木香以上各二錢巴豆杏仁百草霜乾薑以上各五錢黃蠟二錢上先將黃蠟用好醋煮去渣穢將巴豆杏仁同炒黑煙盡研如泥餘四味為細末將黃蠟再上火春夏入小油五錢秋冬入小油八錢溶開入在杏仁巴豆泥子內同攪旋下丁香木香等藥末研勻搓作鋌子油紙裹了旋丸用如芥子大每服三五十丸溫米飲送下食前日三服大有神效白朮安胃散治一切瀉痢無問膿血相雜裡急窘痛日夜無度又治男子小腸氣痛及婦人臍下虛冷併産後兒枕塊痛亦治産後虛弱寒熱不止者五味子烏梅取肉炒乾以上各五錢車前子茯苓白朮以上各一兩米穀三兩去頂蒂穰醋煮一宿炒乾上為末每服五錢水一盞半煎至一盞去渣空心溫服聖餅子治瀉痢赤白臍腹撮痛久不愈者黃丹二錢定粉舶上硫黃陀僧以上各三錢輕粉少許上細銼為末入白麵四錢匕滴水和如指尖大捻作餅子陰乾食前溫漿水磨服之大便黑色為效當歸和血散治腸澼下血濕毒下血川芎四分青皮槐花荊芥穗熟地黃白朮以上各六分當歸身升麻以上各一錢上件為細末每服二三錢清米飲湯調下食前訶梨勒丸治休息痢晝夜無度腥臭不可近臍腹撮痛諸藥不效訶子五錢去核稱椿根白皮一兩母丁香三十個上為細末醋麵糊丸如梧桐子大每服五十丸陳米飯湯入醋少許送下五更三日三服效脾胃損在調飲食適寒溫十四難曰損其脾者調其飲食適其寒溫又云夫脾胃大腸小腸三焦膀胱倉廩之本營之所居名曰器能化糟粕轉味而出入者也若飲食熱無灼灼寒無愴愴寒溫中適故氣將持乃不致邪僻或飲食失節寒溫不適所生之病或溏泄無度或心下痞悶腹脅䐜脹口失滋味四肢困倦皆傷於脾胃所致而然也腸胃為市無物不受無物不入若風寒暑濕燥一氣偏勝亦能傷脾損胃觀證用藥者宜詳審焉脾胃右關所主其脈緩如得弦脈風邪所傷甘草芍藥湯黃耆建中湯之類或甘酸之劑皆可用之洪脈熱邪所傷三黃丸瀉黃散調胃承氣湯或甘寒之劑皆可用之緩脈本經太過濕邪所傷平胃散加白朮茯苓五苓散或除濕滲淡之劑皆可用之澀脈燥熱所傷異功散加當歸四君子湯加熟地黃或甘溫甘潤之劑皆可用之沉細脈寒邪所傷益黃散養胃丸理中丸理中湯如寒甚加附子甘熱之劑皆可用之前項所定方藥乃常道也如變則更之胃風湯治大人小兒風冷乘虛入客腸胃水穀不化泄瀉注下腹脅虛滿腸鳴㽲痛及腸胃濕毒下如豆汁或下瘀血日夜無度並宜服之人參去蘆白茯苓去皮芎蔻桂去粗皮當歸去苗白芍藥白朮以上各等分上為粗散每服二錢以水一大盞入粟米數百餘粒同煎至七分去渣稍熱服空心食前小兒量力減之三黃丸治丈夫婦人三焦積熱上焦有熱攻衝眼目赤腫頭項腫痛口舌生瘡中焦有熱心膈煩躁不美飲食下焦有熱小便赤澀大便祕結五臟俱熱即生癰瘡痍及治五般痔疾肛門腫痛或下鮮血黃連去蘆黃芩去蘆大黃以上各一兩上為細末煉蜜為丸如梧桐子大每服三十丸用熟水吞下如臟腑壅實加服丸數小兒積熱亦宜服之白朮散治虛熱而渴人參去蘆白朮木香白茯苓去皮藿香葉去土甘草炒以上各一兩乾葛二兩上件為粗末每服三錢至五錢水一盞煎至五分溫服如飲水者多煎與之無時服如不能食而渴潔古先師倍加葛根如能食而渴白虎湯加人參服之加減平胃散治脾胃不和不思飲食心腹脅肋脹滿刺痛口苦無味胸滿氣短嘔噦噁心噫氣吞酸面色萎黃肌體瘦弱怠惰嗜臥體重節痛常多自利或發霍亂及五噎八痞膈氣反胃甘草銼炒二兩厚朴去粗皮薑製炒香陳皮去白以上各三兩二錢蒼朮去粗皮米泔浸五兩上為細末每服二錢水一盞入生薑三片干棗二枚同煎至七分去渣溫服或去薑棗帶熱服空心食前入鹽一捻沸湯點服亦得常服調氣暖胃化宿食消痰飲闢風寒冷濕四時非節之氣如小便赤澀加白茯苓澤瀉如米穀不化食飲多傷加枳實如胸中氣不快心下痞氣加枳殼木香如脾胃困弱不思飲食加黃耆人參如心下痞悶腹脹者加厚朴甘草減半如遇夏則加炒黃芩如遇雨水濕潤時加茯苓澤瀉如遇有痰涎加半夏陳皮凡加時除蒼朮厚朴外依例加之如一服五錢有痰加半夏五分如嗽飲食減少脈弦細加當歸黃耆如脈洪大緩加黃芩黃連如大便硬加大黃三錢芒硝二錢先嚼麩炒桃仁爛以藥送下散滯氣湯治因憂氣結中脘腹皮底微痛心下痞滿不思飲食雖食不散常常有痞氣當歸身二分陳皮三分柴胡四分炙甘草一錢半夏一錢五分生薑五片紅花少許上件銼如麻豆大都和一服水二盞煎至一盞去渣稍熱服食前忌濕面酒通幽湯治幽門不通上衝吸門不開噎塞氣不得上下治在幽門閉大便難此脾胃初受熱中多有此證名之曰下脘不通桃仁泥紅花以上各一分生地黃熟地黃以上各五分當歸身炙甘草升麻以上各一錢上㕮咀都作一服水二大盞煎至一盞去渣稍熱服之食前潤腸丸治飲食勞倦大便祕澀或乾燥閉塞不通全不思食及風結血祕皆能閉塞也潤燥和血疏風自然通利也大黃去皮當歸梢羌活以上各五錢桃仁湯浸去皮尖一兩麻子仁去皮取仁一兩二錢五分上除桃仁麻仁另研如泥外搗羅為細末煉蜜為丸如梧桐子大每服五十丸空心用白湯送下導氣除燥湯治飲食勞倦而小便閉塞不通乃血澀致氣不通而竅澀也滑石炒黃茯苓去皮以上各二錢知母細銼酒洗澤瀉以上各三錢黃柏去皮四錢酒洗上㕮咀每服半兩水二盞煎至一盞去渣稍熱服空心如急不拘時候丁香茱萸湯治胃虛嘔噦吐逆膈咽不通乾生薑黃柏以上各二分丁香炙甘草柴胡橘皮半夏以上各五分升麻七分吳茱萸草豆蔻黃耆人參以上各一錢當歸身一錢五分蒼朮二錢上件銼如麻豆大每服半兩水二盞煎至一盞去渣稍熱服食前忌冷物草豆蔻丸治脾胃虛而心火乘之不能滋榮上焦元氣遇冬腎與膀胱之寒水旺時子能令母實致肺金大腸相輔而來克心乘脾胃此大復其仇也經云大勝必大復故皮毛血脈分肉之間元氣已絶於外又大寒大燥二氣並乘之則苦惡風寒耳鳴及腰背相引胸中而痛鼻息不通不聞香臭額寒腦痛目時眩目不欲開腹中為寒水反乘痰唾沃沫食入反出腹中常痛及心胃痛脅下急縮有時而痛腹不能努大便多瀉而少祕下氣不絶或腸鳴此脾胃虛之極也胸中氣亂心煩不安而為霍亂之漸膈咽不通噎塞極則有聲喘喝閉塞或日陽中或暖房內稍緩口吸風寒則復作四肢厥逆身體沉重不能轉側頭不可以回顧小便溲而時躁此藥主秋冬寒涼大復氣之藥也澤瀉一分小便數減半柴胡二分或四分須詳脅痛多少用神麯薑黃以上各四分當歸身生甘草熟甘草青皮以上各六分桃仁湯洗去皮尖七分白殭蠶吳茱萸湯洗去苦烈味焙乾益智仁黃耆陳皮人參以上各八分半夏一錢湯洗七次草豆蔻仁一錢四分麵裹燒面熟為度去皮用仁麥糵面炒黃一錢五分上件一十八味同為細末桃仁另研如泥再同細末一處研勻湯浸蒸餅為丸如梧桐子大每服三五十丸熟白湯送下旋斟酌多少神聖復氣湯治復氣乘冬足太陽寒氣足少陰腎水之旺子能令母實手太陰肺實反來侮土火木受邪腰背胸膈閉塞疼痛善嚏口中涎目中泣鼻中流濁涕不止或如瘜肉不聞香臭咳嗽痰沫上熱如火下寒如冰頭作陳痛目中流火視物䀮䀮耳鳴耳聾頭並口鼻或惡風寒喜日陽夜臥不安常覺痰塞膈咽不通口失味兩脅縮急而痛牙齒動搖不能嚼物陰汗出前陰冷行步欹側起居艱難掌中寒風痹麻木小便數而晝多夜頻而缺氣短喘喝少氣不足以息卒遺失無度婦人白帶陰戶中大痛牽心而痛黧黑失色男子控睪牽心腹陰陰而痛面如赭色食少大小便不調煩心霍亂逆氣裡急而腹皮色白後出餘氣腹不能努或腸鳴膝下筋急肩胛大痛此皆寒水來復火土之雜也黑附子炮裹去皮臍乾薑炮為末以上各三分防風銼如豆大郁李仁湯浸去皮尖另研如泥人參以上各五分當歸身酒洗六分半夏湯泡七次升麻銼以上各七分甘草銼藁本以上各八分柴胡銼如豆大羌活銼如豆大以上各一錢白葵花五朵去心細剪入上件藥都一服水五盞煎至二盞入橘皮五分草豆蔻仁麵裹燒熟去皮黃耆以上各一錢上件入在內再煎至一盞再入下項藥生地黃二分酒洗黃柏酒浸黃連酒浸枳殼以上各三分以上四味預一日另用新水浸又以細辛二分川芎細末蔓荊子以上各三分預一日用新水半大盞分作二處浸此三味並黃柏等煎正藥作一大盞不去渣入此浸者藥再上火煎至一大盞去渣稍熱服空心又能治齧頰齧唇齧舌舌根強硬等證如神忌肉湯宜食肉不助經絡中火邪也大抵腎並膀胱經中有寒元氣不足者皆宜服之脾胃將理法白粥粳米緑豆小豆鹽豉之類皆淡滲利小便且小便數不可更利況大瀉陽氣反行陰道切禁濕面如食之覺快勿禁藥中不可服澤瀉豬苓茯苓燈心琥珀通草木通滑石之類皆行陰道而瀉陽道也如渴如小便不利或閉塞不通則服得利勿再服忌大咸助火邪而瀉腎水真陰及大辛味蒜韭五辣醋大料物官桂乾薑之類皆傷元氣若服升沉之藥先一日將理次日腹空服服畢更宜將理十日先三日尤甚不然則反害也夫諸病四時用藥之法不問所病或溫或涼或熱或寒如春時有疾於所用藥內加清涼風藥夏月有疾加大寒之藥秋月有疾加溫氣藥冬月有疾加大熱之藥是不絶生化之源也錢仲陽醫小兒深得此理內經必先噦氣毋伐天和是為至治又曰無違時無伐化又曰無伐生生之氣皆此常道也用藥之法若反其常道而變生異證則當從權施治假令病人飲酒或過食寒或過食熱皆可以增病如此則以權衡應變治之權變之藥豈可常用乎攝養忌浴當風汗當風須以手摩汗孔合方許見風必無中風中寒之疾遇卒風暴寒衣服不能御者則宜爭努周身之氣以當之氣弱不能御者病如衣薄而氣短則添衣於無風處居止氣尚短則以沸湯一碗熏其口鼻即不短也如衣厚於不通風處居止而氣短則宜減衣摩汗孔令合於漫風處居止如久居高屋或天寒陰濕所遏令氣短者亦如前法熏之如居周密小室或大熱而處寒涼氣短則出就風日凡氣短皆宜食滋味湯飲令胃調和或大熱能食而渴喜寒飲當從權以飲之然不可耽嗜如冬寒喜熱物亦依時暫食夜不安寢衾厚熱壅故也當急去之仍拭汗或薄而不安即加之睡自穩也飢而睡不安則宜少食飽而睡不安則少行坐遇天氣變更風寒陰晦宜預避之大抵宜溫暖避風寒省語少勞役為上遠欲名與身孰親身與貨孰多以隋侯之珠彈千仞之雀世必笑之何取之輕而棄之重耶殘軀六十有五耳目半失於視聽百脈沸騰而煩心身如衆派漂流瞑目則魂如浪去神氣衰於前日飲食減於囊時但應人事病皆彌甚以己之所有豈止隋候之珠哉安於淡薄少思寡欲省語以養氣不妄作勞以養形虛心以維神壽夭得失安之於數得喪既輕血氣自然諧和邪無所容病安增劇苟能持此亦庶幾於道可謂得其真趣矣省言針氣乃神之祖精乃氣之子氣者精神之根蒂也大矣哉積氣以成精積精以全神必清必靜御之以道可以為天人矣有道者能之豫何人哉切宜省言而已

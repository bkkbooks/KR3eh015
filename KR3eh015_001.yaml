body:
  text: 卷上脾胃虛實傳變論五臟別論云胃大腸小腸三焦膀胱此五者天氣之所生也其氣象天故瀉而不藏此受五臟濁氣名曰傳化之府此不能久留輸瀉者也所謂五臟者藏精氣而不瀉也故滿而不能實六腑者傳化物而不藏故實而不能滿所以然者水穀入口則胃實而腸虛食下則腸實而胃虛故曰實而不滿滿而不實也陰陽應象大論云穀氣通於脾六經為川腸胃為海九竅為水注之氣九竅者五臟主之五臟皆得胃氣乃能通利通評虛實論云頭痛耳鳴九竅不利腸胃之所生也胃氣一虛耳目口鼻俱為之病經脈別論云食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也又云陰之所和本在五味陰之五官傷在五味至於五味口嗜而欲食之必自裁製勿使過焉過則傷其正也謹和五味骨正筋柔氣血以流腠理以密如是則骨氣以精謹道如法長有天命平人氣象論云人以水穀為本故人絕水穀則死脈無胃氣亦死所謂無胃氣者非肝不弦腎不石也歷觀諸篇而參考之則元氣之充足皆由脾胃之氣無所傷而後能滋養元氣若胃氣之本弱飲食自倍則脾胃之氣既傷而元氣亦不能充而諸病之所由生也內經之旨皎如日星猶恐後人有所未達故靈樞經中復申其說經云水穀入口其味有五各注其海津液各走其道胃者水穀之海其輸上在氣街下至三里水穀之海有餘則腹滿水穀之海不足則飢不受穀食人之所受氣者谷也谷之所注者胃也胃者水穀氣血之海也海之所行雲氣者天下也胃之所出氣血者經隧也經隧者五臟六腑之大絡也又云五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈化而為血以榮四末內注五臟六腑以應刻數焉衛者出其悍氣之慓疾而行於四末分肉皮膚之間而不休者也又云中焦之所出亦並胃中出上焦之後此所受氣者泌糟粕蒸津液化為精微上注於肺脈乃化而為血以奉生身莫貴於此聖人諄復其辭而不憚其煩者仁天下後世之心亦倦倦矣故夫飲食失節寒溫不適脾胃乃傷此因喜怒憂恐損耗元氣資助心火火與元氣不兩立火勝則乘其土位此所以病也調經篇云病生陰者得之飲食居處陰陽喜怒又云陰虛則內熱有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故為內熱脾胃一傷五亂互作其始病遍身壯熱頭痛目眩肢體沉重四肢不收怠惰嗜臥為熱所傷元氣不能運用故四肢困怠如此聖人著之於經謂人以胃土為本成文演義互相發明不一而止粗工不解讀妄意使用本以活人反以害人今舉經中言病從脾胃所生及養生當實元氣者條陳之生氣通天論云蒼天之氣清淨則志意治順之則陽氣固雖有賊邪弗能害也此因時之序故聖人傳精神服天氣而通神明失之內閉九竅外壅肌肉衛氣散解此謂自傷氣之削也陽氣者煩勞則張精絕闢積於夏使人煎厥目盲耳閉潰潰乎若壞都故蒼天之氣貴清淨陽氣惡煩勞病從脾胃生者一也五常政大論云陰精所奉其人壽陽精所降其人夭陰精所奉謂脾胃既和穀氣上升春夏令行故其人壽陽精所降謂脾胃不和穀氣下流收藏令行故其人夭病從脾胃生者二也六節臟象論云脾胃大腸小腸三焦膀胱者倉廩之本榮之居也名曰器能化糟粕轉味而入出者也其華在唇四白其充在肌其味甘其色黃此至陰之類通於土氣凡十一臟皆取決於膽也膽者少陽春生之氣春氣升則萬化安故膽氣春升則餘臟從之膽氣不升則飧泄腸澼不一而起矣病從脾胃生者三也經云天食人以五氣地食人以五味五氣入鼻藏於心肺上使五色修明音聲能彰五味入口藏於腸胃味有所藏以養五氣氣和而生津液相成神乃自生此謂之氣者上焦開發宣五穀味熏膚充身澤毛若霧露之溉氣或乖錯人何以生病從脾胃生者四也豈特四者至於經論天地之邪氣感則害人五臟六腑及形氣俱虛乃受外邪不因虛邪賊邪不能獨傷人諸病從脾胃而生明矣聖人旨意重見疊出詳盡如此且垂戒云法於陰陽和於術數食飲有節起居有常不妄作勞故能形與神俱而盡終其天年度百歲乃去由是言之飲食起居之際可不慎哉臟氣法時升降浮沉補瀉圖說五行相生木火土金水循環無端惟脾無正行於四季之末各旺一十八日以生四臟四季者辰戌醜未是也人身形以應九野左足主立春醜位是也左手主立夏辰位是也右手主立秋未位是也右足主立冬戌位是也戌濕其本氣平其兼氣溫涼寒熱在人以胃應之己土其本味鹹其兼味辛甘酸苦在人以脾應之脾胃兼化其病治之各從其宜不可定體肝肺之病在水火之間順逆傳變不同溫涼不定當求責耳脾胃勝衰論胃中元氣盛則能食而不傷過時而不飢脾胃俱旺則能食而肥脾胃俱虛則不能食而瘦或少食而肥雖肥而四肢不舉蓋脾實而邪氣盛也又有善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削即食亦也叔和云多食亦肌虛此之謂也夫飲食不節則胃病胃病則氣短精神少而生大熱有時而顯火上行獨燎其面黃帝針經云面熱者足陽明病胃既病則脾無所稟受脾為死陰不主時也故亦從而病焉形體勞役則脾病脾病則怠惰嗜臥四肢不收大便泄瀉脾既病則其胃不能獨行津液故亦從而病焉大抵脾胃虛弱陽氣不能生長是春夏之令不行五臟之氣不生脾病則下流乘腎土剋水則骨乏無力是為骨蝕令人骨髓空虛足不能履地是陰氣重疊此陰盛陽虛之證大法云汗之則愈下之則死若用辛甘之藥滋胃當升當浮使生長之氣旺言其汗者非正發汗也為助陽也夫胃病其脈緩脾病其脈遲且其人當臍有動氣按之牢若痛若火乘土位其脈洪緩更有身熱心中不便之證此陽氣衰弱不能生髮不當於五臟中用藥法治之當從臟氣法時論中升降浮沉補瀉法用藥耳如脈緩病怠惰嗜臥四肢不收或大便泄瀉此濕勝從平胃散若脈弦氣弱自汗四肢發熱或大便泄瀉或皮毛枯槁發脫落從黃耆建中湯脈虛而血弱於四物湯中摘一味或二味以本顯證中加之或真氣虛弱及氣短脈弱從四君子湯或渴或小便閉澀赤黃多少從五苓散去桂摘一二味加正藥中以上五藥當於本證中隨所兼見證加減假令表虛自汗春夏加黃耆秋冬加桂如腹中急縮或脈弦加防風急甚加甘草腹中窄狹或氣短者亦加之腹滿氣不轉者勿加雖氣不轉而脾胃中氣不和者勿去但加厚朴以破滯氣然亦不可多用於甘草五分中加一分可也腹中夯悶此非腹脹乃散而不收可加芍藥收之如肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中升陽使肝膽之邪不敢犯也腹中窄狹及縮急者去之及諸酸澀藥亦不可用腹中痛者加甘草白芍藥稼穡作甘甘者己也曲直作酸酸者甲也甲己化土此仲景妙法也腹痛兼發熱加黃芩惡寒或腹中覺寒加桂怠惰嗜臥有濕胃虛不能食或沉困或泄瀉加蒼朮自汗加白朮小便不利加茯苓渴亦加之氣弱者加白茯苓人參氣盛者加赤茯苓縮砂仁氣復不能轉運有熱者微加黃連心煩亂亦加之小便少者加豬苓澤瀉汗多津液竭於上勿加之是津液還入胃中欲自行也不渴而小便閉塞不通加炒黃柏知母小便澀者加炒滑石小便淋澀者加澤瀉且五苓散治渴而小便不利無惡寒者不得用桂不渴而小便自利妄見妄聞乃瘀血證用炒黃柏知母以除腎中燥熱竅不利而淋加澤瀉炒滑石只治竅不利者六一散中加木通亦可心臟熱者用錢氏方中導赤散中滿或但腹脹者加厚朴氣不順加橘皮氣滯加青皮一橘皮三氣短小便利者四君子湯中去茯苓加黃耆以補之如腹中氣不轉者更加甘草一半腹中刺痛或周身刺痛者或裡急者腹中不寬快是也或虛坐而大便不得者皆血虛也血虛則裡急或血氣虛弱而目睛痛者皆加當歸身頭痛者加川芎苦頭痛加細辛此少陰頭痛也發脫落及臍下痛加熟地黃予平昔調理脾胃虛弱於此五藥中加減如五臟證中互顯一二證各對證加藥無不驗然終不能使人完復後或有因而再至者亦由督任沖三脈為邪皆胃氣虛弱之所致也法雖依證加減執方料病不依素問法度耳是以檢討素問難經及黃帝針經中說脾胃不足之源乃陽氣不足陰氣有餘當從六氣不足升降浮沉法隨證用藥治之蓋脾胃不足不同餘臟無定體故也其治肝心肺腎有餘不足或補或瀉惟益脾胃之藥為切經云至而不至是為不及所勝妄行所生受病所不勝乘之也至而不至者謂從後來者為虛邪心與小腸來乘脾胃也脾胃脈中見浮大而弦其病或煩躁悶亂或四肢發熱或口乾舌乾咽乾蓋心主火小腸主熱火熱來乘土位乃濕熱相合故煩躁悶亂也四肢者脾胃也火乘之故四肢發熱也飲食不節勞役所傷以致脾胃虛弱乃血所生病主口中津液不行故口乾咽乾也病人自以為渴醫者治以五苓散謂止渴燥而反加渴燥乃重竭津液以至危亡經云虛則補其母當於心與小腸中以補脾胃之根蒂者甘溫之藥為之主以苦寒之藥為之使以酸味為之臣佐以其心苦緩急食酸以收之心火旺則肺金受邪金虛則以酸補之次以甘溫及甘寒之劑於脾胃中瀉心火之亢盛是治其本也所勝妄行者言心火旺能令母實母者肝木也肝木旺則挾火勢無所畏懼而妄行也故脾胃先受之或身體沉重走疰疼痛蓋濕熱相搏而風熱鬱而不得伸附著於有形也或多怒者風熱下陷於地中也或目病而生內障者脾裹血胃主血心主脈脈者血之腑也或云心主血又云肝主血肝之竅開於目也或妄見妄聞起妄心夜夢亡人四肢滿閉轉筋皆肝木火盛而為邪也或生痿或生痹或生厥或中風或生惡瘡或作腎痿或為上熱下寒為邪不一皆風熱不得升長而木火遏於有形中也所生受病者言肺受土火木之邪而清肅之氣傷或胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也或咳嗽寒熱者濕熱乘其內也所不勝乘之者水乘木之妄行而反來侮土故腎入心為汗入肝為泣入脾為涎入肺為痰為嗽為涕為嚏為水出鼻也一說下元土盛剋水致督任沖三脈盛火旺煎熬令水沸騰而乘脾肺故痰涎唾出於口也下行為陰汗為外腎冷為足不任身為腳下隱痛或水附木勢而上為眼澀為眵為冷淚此皆由肺金之虛而寡於畏也夫脾胃不足皆為血病是陽氣不足陰氣有餘故九竅不通諸陽氣根於陰血中陰血受火邪則陰盛陰盛則上乘陽分而陽道不行無生髮升騰之氣也夫陽氣走空竅者也陰氣附形質者也如陰氣附於土陽氣升於天則各安其分也今所立方中有辛甘溫藥者非獨用也復有甘苦大寒之劑亦非獨用也以火酒二製為之使引苦甘寒藥至頂而復入於腎肝之下此所謂升降浮沉之道自耦而奇奇而至耦者也陽分奇陰分偶瀉陰火以諸風藥升發陽氣以滋肝膽之用是令陽氣生上出於陰分末用辛甘溫藥接其升藥使大發散於陽分而令走九竅也經云食入於胃散精於肝淫氣於筋食入於胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑且飲食入胃先行陽道而陽氣升浮也浮者陽氣散滿皮毛升者充塞頭頂則九竅通利也若飲食不節損其胃氣不能克化散於肝歸於心溢於肺食入則昏冒欲睡得臥則食在一邊氣暫得舒是知升發之氣不行者此也經云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺病人飲入胃遽覺至臍下便欲小便由精氣不輸於脾不歸於肺則心火上攻使口燥咽乾是陰氣大盛其理甚易知也況脾胃病則當臍有動氣按之牢若痛有是者乃脾胃虛無是則非也亦可作明辨矣脾胃不足是火不能生土而反抗拒此至而不至是為不及也白朮君人參臣甘草佐芍藥佐黃連使黃耆臣桑白皮佐諸風藥皆是風能勝濕也及諸甘溫藥亦可心火亢盛乘於脾胃之位亦至而不至是為不及也黃連君黃柏臣生地黃臣芍藥佐石膏佐知母佐黃芩佐甘草佐肝木妄行胸脅痛口苦舌乾往來寒熱而嘔多怒四肢滿閉淋溲便難轉筋腹中急痛此所不勝乘之也羌活佐防風臣升麻使柴胡君獨活佐芍藥臣甘草臣白朮佐茯苓佐豬苓澤瀉佐肉桂臣藁本川芎細辛蔓荊子白芷石膏黃柏佐知母滑石肺金受邪由脾胃虛弱不能生肺乃所生受病也故咳嗽氣短氣上皮毛不能禦寒精神少而渴情慘慘而不樂皆陽氣不足陰氣有餘是體有餘而用不足也人參君白朮佐白芍藥佐橘皮臣青皮以破滯氣黃耆臣桂枝佐桔梗引用桑白皮佐甘草諸酸之藥皆可木香佐檳榔五味子佐此三味除客氣腎水反來侮土所勝者妄行也作涎及清涕唾多溺多而惡寒者是也土火復之及三脈為邪則足不任身足下痛不能踐地骨之無力喜睡兩丸冷腹陰陰而痛妄聞妄見腰脊背胛皆痛乾薑君白朮臣蒼朮佐附子佐炮少許肉桂佐去皮少許川烏頭臣茯苓佐澤瀉使豬苓佐夫飲食入胃陽氣上行津液與氣入於心貫於肺充實皮毛散於百脈脾稟氣於胃而灌溉四旁營養氣血者也今飲食損胃勞倦傷脾脾胃虛則火邪乘之而生大熱當先於心分補脾之源蓋土生於火兼於脾胃中瀉火之亢甚主生化之源足陽明為十二經之海主經營之氣諸經皆稟之言陽明厥陰與何經相併而為病酌中以用藥如權之在衡在兩則有在兩之中在斤則有在斤之中也所以言此者發明脾胃之病不可一例而推之不可一途而取之欲人知百病皆由脾胃衰而生也毫釐之失則災害立生假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名曰補脾胃瀉陰火升陽湯補脾胃瀉陰火升陽湯柴胡一兩五錢甘草炙黃耆臣蒼朮泔浸去黑皮切作片子日曝乾銼碎炒羌活以上各一兩升麻八錢人參臣黃芩以上各七錢黃連去須酒製五錢炒為臣為佐石膏少許長夏微用過時去之從權上件㕮咀每且三錢水二盞煎至一盞去渣大溫服早飯後午飯前間日服服藥之時宜減食宜美食服藥訖忌語話一二時辰許及酒濕面大料物之類恐大濕熱之物復助火邪而愈損元氣也亦忌冷水及寒涼淡滲之物及諸果恐陽氣不能生旺也宜溫食及薄滋味以助陽氣大抵此法此藥欲令陽氣升浮耳若滲泄淡味皆為滋陰之味為大禁也雖然亦有從權而用之者如見腎火旺及督任沖三脈盛則用黃柏知母酒洗訖火炒制加之若分兩則臨病斟酌不可久服恐助陰氣而為害也小便亦或澀當利之大便澀當行之此亦從權也得利則勿再服此雖立食禁法若可食之物一切禁之則胃氣失所養也亦當從權而食之以滋胃也附夫飲食人胃陽氣上行津液與氣入於心貫於肺充實皮毛散於百脈脾稟氣於胃而灌溉四旁營養氣血者也今飲食損胃勞倦傷脾脾胃虛則火邪乘之而生大熱當先於心分補脾之源蓋土生於火兼於脾胃中瀉火之亢甚是先治其標後治其本也且濕熱相合陽氣日以虛陽氣虛則不能上升而脾胃之氣下流並於腎肝是有秋冬而無春夏春主升夏主浮在人則肝心應之弱則陰氣盛故陽氣不得經營經云陽本根於陰惟瀉陰中之火味薄風藥升發以伸陽氣則陰氣不病陽氣生矣傳云履端於始序則不愆正謂此也四氣調神大論云天明則日月不明邪害空竅陽氣者閉塞地氣者冒明雲霧不精則上應白露不下在人則緣胃虛以火乘之脾為勞倦所傷勞則氣耗而心火熾動血脈沸騰則血病而陽氣不治陰火乃獨炎上而走於空竅以至燎於周身反用熱藥以燥脾胃則謬之謬也胃乃脾之剛脾乃胃之柔表裡之謂也飲食不節則胃先病脾無所稟而後病勞倦則脾先病不能為胃行氣而後病其所生病之先後雖異所受邪則一也胃為十二經之海十二經皆稟血氣滋養於身脾受胃之稟行其氣血也脾胃既虛十二經之邪不一而出假令不能食而肌肉削乃本病也其右關脈緩而弱本脈也而本部本證脈中兼見弦脈或見四肢滿閉淋溲便難轉筋一二證此肝之脾胃病也當於本經藥中加風藥以瀉之本部本證脈中兼見洪大或見肌熱煩熱面赤而不能食肌內消一二證此心之脾胃病也當於本經藥中加瀉心火之藥本部本證脈中兼見浮澀或見氣短氣上喘咳痰盛皮澀一二證此肺之脾胃病也當於本經藥中兼瀉肺之體及補氣之藥本部本證脈中兼見沉細或見善恐欠之證此腎之脾胃病也當於本經藥中加瀉腎水之浮及瀉陰火伏熾之藥經云病有逆從治有反正除四反治法不須論之其下云惟有陽明厥陰不從標本從乎中也其注者以陽明在上中見太陰厥陰在上中見少陽為說予獨謂不然此中非中外之中也亦非上中之中也乃不定之辭蓋欲人臨病消息酌中用藥耳以手足陽明厥陰者中氣也在卯酉之分天地之門戶也春分秋分以分陰陽也中有水火之異者也況手厥陰為十二經之領袖主生化之源足陽明為十二經之海主經營之氣諸經皆稟之言陽明厥陰與何經相併而為病酌中以用藥如權之在衡在兩則有在兩之中在斤則有在斤之中也所以言此者發明脾胃之病不可一例而推之不可一途而取之欲人知百病皆由脾胃衰而生也毫釐之失則災害立生假如時在長夏於長夏之令中立方謂正當主氣衰而客氣旺之時也後之處方者當從此法加時令藥名曰補脾胃瀉陰火升陽湯肺之脾胃虛論脾胃之虛怠惰嗜臥四肢不收時值秋燥令行濕熱少退體重節痛口苦舌乾食無味大便不調小便頻數不嗜食食不消兼見肺病瀝淅惡寒慘慘不樂面色惡而不和乃陽氣不伸故也當升陽益胃名之曰升陽益胃湯升陽益胃湯黃耆二兩半夏湯洗此一味脈澀者宜用人參去蘆甘草炙以上各一兩防風以其秋旺故以辛溫瀉之白芍藥羌活獨活以上各五錢橘皮連瓤四錢茯苓小便利不渴者勿用澤瀉不淋勿用柴胡白朮以上各三錢黃連二錢何故秋旺用人參白朮芍藥之類反補肺為脾胃虛則肺最受病故因時而補易為力也上㕮咀每服三錢生薑五片棗二枚去核水一盞同煎至二盞去渣溫服早飯午飯之間服之禁忌如前其藥漸加至五錢止服藥後如小便罷而病加增劇是不宜利小便當少去茯苓澤瀉若喜食初一二日不可飽食恐胃再傷以藥力尚少胃氣不得轉運升發也須薄滋味之食或美食助其藥力益升浮之氣而滋其胃氣也慎不可淡食以損藥力而助邪氣之降沉也可以小役形體使胃與藥得轉運升發慎勿大勞役使復傷若脾胃得安靜尤佳若胃氣少覺強壯少食果以助谷藥之力經云五穀為養五果為助者也君臣佐使法至真要大論云有毒無毒所治為主主病者為君佐君者為臣應臣者為使一法力大者為君凡藥之所用皆以氣味為主補瀉在味隨時換氣氣薄者為陽中之陰氣厚者為陽中之陽味薄者為陰中之陽味厚者為陰中之陰辛甘淡中熱者為陽中之陽辛甘淡中寒者為陽中之陰酸苦鹹之寒者為陰中之陰酸苦咸之熱者為陰中之陽夫辛甘淡酸苦咸乃味之陰陽又為地之陰陽也溫涼寒熱乃氣之陰陽又為天之陰陽也氣味生成而陰陽造化之機存焉一物之內氣味兼有一藥之中理性具焉主對治療由是而出假令治表實麻黃葛根表虛桂枝黃耆裡實枳實大黃裡虛人參芍藥熱者黃芩黃連寒者乾薑附子之類為君君藥分兩最多臣藥次之使藥又次之不可令臣過於君君臣有序相與宣攝則可以御邪除病矣如傷寒論云陽脈澀陰脈弦法當腹中急痛以芍藥之酸於土中瀉木為君飴糖炙甘草甘溫補脾養胃為臣水挾木勢亦來侮土故脈弦而腹痛肉桂大辛熱佐芍藥以退寒水薑棗甘辛溫發散陽氣行於經脈皮毛為使建中之名於此見焉有緩急收散升降浮沉澀滑之類非一從權立法於後如皮毛肌肉之不伸無大熱不能食而渴者加葛根五錢燥熱及胃氣上衝為衝脈所逆或作逆氣而裡急者加炒黃柏知母覺胸中熱而不渴加炒黃芩如胸中結滯氣澀或有熱病者亦各加之如食少而小便少者津液不足也勿利之益氣補胃自行矣如氣弱氣短者加人參只升陽之劑助陽尤勝加人參惡熱發熱而燥渴脈洪大白虎湯主之或喘者加人參如渴不止寒水石石膏各等分少少與之即錢氏方中甘露散主身大熱而小便數或上飲下溲此燥熱也氣燥加白葵花血燥加赤葵花如脈弦只加風藥不可用五苓散如小便行病增者此內燥津液不能停當致津液加炒黃柏赤葵花如心下痞悶者加黃連一黃芩三減諸甘藥不能食心下軟而痞者甘草瀉心湯則愈痞有九種治有仲景湯五方瀉心湯如喘滿者加炙厚朴如胃虛弱而痞者加甘草如喘而小便不利者加苦葶藶小便不利者加之小便利為禁藥也如氣短氣弱而腹微滿者不去人參去甘草加厚朴然不若苦味泄之而不令大便行如腹微滿而氣不轉加之中滿者去甘草倍黃連加黃柏更加三味五苓散少許此病雖宜升宜汗如汗多亡陽加黃耆四肢煩熱肌熱與羌活柴胡升麻葛根甘草則愈如鼻流清涕惡風或項背脊背強痛羌活防風甘草等分黃耆加倍臨臥服之如有大熱脈洪大加苦寒劑而熱不退者加石膏如脾胃中熱加炒黃連甘草凡治此病脈數者當用黃柏或少加黃連以柴胡蒼朮黃耆甘草更加升麻得汗出則脈必下乃火鬱則發之也如證退而脈數不退不洪大而疾有力者多減苦藥加石膏如大便軟或泄者加桔梗食後服之此藥若誤用則其害非細用者當斟酌旋旋加之如食少者不可用石膏石膏善能去脈數疾病退脈數不退者不可治也如不大渴亦不可用如脈弦而數者此陰氣也風藥升陽以發火鬱則脈數峻退矣以上五法加減未盡特以明大概耳分經隨病制方脈經云風寒汗出肩背痛中風小便數而欠者風熱乘其肺使肺氣鬱甚也當瀉風熱以通氣防風湯主之通氣防風湯柴胡升麻黃耆以上各一錢羌活防風橘皮人參甘草以上各五分藁本三分青皮白豆蔻仁黃柏以上各二分上㕮咀都作一服水二大盞煎至一盞去渣溫服食後氣盛者宜服面白脫色氣短者勿服如小便遺失者肺氣虛也宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地黃如肩背痛不可回顧此手太陽氣鬱而不行以風藥散之如脊痛項強腰似折項似拔上衝頭痛者乃足太陽經之不行也以羌活勝濕湯主之羌活勝濕湯羌活獨活以上各一錢甘草炙藁本防風以上各五分蔓荊子三分川芎二分上件㕮咀都作一服水二盞煎至一盞去渣溫服食後如身重腰沉沉然乃經中有濕熱也更加黃柏一錢附子半錢蒼朮二錢如腿腳沉重無力者加酒洗漢防己半錢輕則附子重則川烏頭少許以為引用而行經也如臥而多驚小便淋溲者邪在少陽厥陰亦用太陽經藥更加柴胡半錢如淋加澤瀉半錢此下焦風寒二經合病也經云腎肝之病同一治為俱在下焦非風藥行經不可也如大便後有白膿或只便白膿者因勞役氣虛傷大腸也以黃耆人參湯補之如裡急頻見者血虛也更加當歸如肺脹膨膨而喘咳胸高氣滿壅盛而上奔者多加五味子人參次之麥門冬又次之黃連少許如甚則交兩手而瞀者真氣大虛也若氣短加黃耆五味子人參氣盛加五味子人參黃芩荊芥穗冬月去荊芥穗加草豆蔻仁如嗌痛頷腫脈洪大面赤者加黃芩桔梗甘草各五分如耳鳴目黃頰頷腫頸肩臑肘臂外後廉痛面赤脈洪大者以羌活防風甘草藁本通其經血加黃芩黃連消其腫以人參黃耆益其元氣而瀉其火邪如脈緊者寒也或面白善嚏或面色惡皆寒也亦加羌活等四味當瀉足太陽不用連芩少加附子以通其脈面色惡多悲恐者更加桂附如便白膿少有滑頻見汙衣者氣脫加附子皮甚則加米殼如氣澀者只以甘藥補氣當安臥不語以養其氣用藥宜禁論凡治病服藥必知時禁經禁病禁藥禁夫時禁者必本四時升降之理汗下吐利之宜大法春宜吐象萬物之發生耕耨科斫使陽氣之郁者易達也夏宜汗象萬物之浮而有餘也秋宜下象萬物之收成推陳致新而使陽氣易收也冬周密象萬物之閉藏使陽氣不動也經云夫四時陰陽者與萬物浮沉於生長之門逆其根伐其本壞其真矣又云用溫遠溫用熱遠熱用涼遠涼用寒遠寒無翼其勝也故冬不用白虎夏不用青龍春夏不服桂枝秋冬不服麻黃不失氣宜如春夏而下秋冬而汗是失天信伐天和也有病則從權過則更之經禁者足太陽膀胱經為諸陽之首行於背表之表風寒所傷則宜汗傳入本則宜利小便若下之太早必變證百出此一禁也足陽明胃經行身之前主腹滿脹大便難宜下之蓋陽明化燥火津液不能停禁發汗利小便為重損津液此二禁也足少陽膽經行身之側在太陽陽明之間病則往來寒熱口苦胸脅痛只宜和解且膽者無出無入又主發生之氣下則犯太陽汗則犯陽明利小便則使生髮之氣反陷入陰中此三禁也三陰非胃實不當下為三陰無傳本須胃實得下也分經用藥有所據焉病禁者如陽氣不足陰氣有餘之病則凡飲食及藥忌助陰瀉陽諸淡食及淡味之藥瀉升發以助收斂也諸苦藥皆沉瀉陽氣之散浮諸薑附官桂辛熱之藥及濕面酒大料物之類助火而瀉元氣生冷硬物損陽氣皆所當禁也如陰火欲衰而退以三焦元氣未盛必口淡淡如咸物亦所當禁藥禁者如胃氣不行內亡津液而乾涸求湯飲以自救非渴也乃口乾也非溫勝也乃血病也當以辛酸益之而淡滲五苓之類則所當禁也汗多禁利小便小便多禁發汗咽痛禁發汗利小便若大便快利不得更利大便秘澀以當歸桃仁麻子仁郁李仁皂角仁和血潤腸如燥藥則所當禁者吐多不得復吐如吐而大便虛輒者此土氣壅滯以薑橘之屬宣之吐而大便不通則利大便上藥則所當禁也諸病惡瘡及小兒癍後大便實者亦當下之而薑橘之類則所當禁也又如脈弦而服平胃散脈緩而服黃耆建中湯乃實實虛虛皆所當禁也人稟天之濕化而生胃也胃之與濕其名雖二其實一也濕能滋養於胃胃濕有餘亦當瀉濕之太過也胃之不足惟濕物能滋養仲景云胃勝思湯餅而胃虛食湯餅者往往增劇濕能助火火旺鬱而不通主大熱初病火旺不可食以助火也察其時辨其經審其病而後用藥四者不失其宜則善矣內經仲景所說脾胃著論處方已詳矣然恐或者不知其源而無所考據復以黃帝內經仲景所說脾胃者列於下太陰陽明論云太陰陽明為表裡脾胃脈也生病而異者何也岐伯曰陰陽異位更虛更實更逆更從或從內或從外所從不同故病異名也帝曰願聞其異狀也岐伯曰陽者天氣也主外陰者地氣也主內故陽道實陰道虛故犯賊風虛邪者陽受之食飲不節起居不時者陰受之陽受之則入六腑陰受之則入五臟入六腑則身熱不得臥上為喘呼入五臟則腹滿閉塞下為飧泄久為腸澼故喉主天氣咽主地氣故陽受風氣陰受濕氣陰氣從足上行至頭而下行循臂至指端陽氣從手上行至頭而下行至足故曰陽病者上行極而下陰病者下行極而上故傷於風者上先受之傷於濕者下先受之帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉帝曰脾不主時何也岐伯曰脾者土也治中央常以四時長四臟各十八日寄治不得獨主於時也脾臟者常著胃土之精也土者生萬物而法天地故上下至頭足不得主時也陰陽應象論曰人有五臟化五氣以生喜怒悲憂恐故喜怒傷氣寒暑傷形暴怒傷陰暴喜傷陽厥氣上行滿脈去形喜怒不節寒暑過度生乃不固玉機真臟論曰脾大過則令人四肢不舉其不及則令人九竅不通名曰重強又通評虛實論曰頭痛耳鳴九竅不利腸胃之所生也調經論曰形有餘則腹脹經溲不利不足則四肢不用又氣交變論曰歲土太過雨濕流行腎水受邪民病腹痛清厥意不樂體重煩冤甚則肌肉萎足萎不收行善瘈腳下痛飲發中滿食減四肢不舉又云歲土不及風乃大行霍亂體重腹痛筋骨繇復肌肉潤酸善怒又云咸病寒中復則收政嚴峻胸脅暴痛下引少腹善太息蟲食甘黃氣客於脾民食少失味又云土不及四維有埃云潤澤之化不行則春有鳴條鼓拆之政四維發振拉飄勝之變則秋有肅殺霖淫之復其眚四維其臟脾其病內舍心腹外在肌肉四肢五常政大論土平曰備化不及曰卑監又云其動瘍湧分潰癰腫其發濡滯其病留滿痞塞從木化也其病飧泄又云土太過曰敦阜其味甘鹹酸其象長夏其經足太陰陽明又曰其病腹滿四肢不舉邪傷脾也經脈別論云太陰藏搏者用心省真五脈氣少胃氣不平三陰也宜治其下俞補陽瀉陰臟氣法時論云脾主長夏足太陰陽明主治其日戊己脾苦濕急食苦以燥之又云病在脾愈在秋秋不愈甚於春春不死持於夏起於長夏禁溫食飽食濕地濡衣脾病者愈在庚辛庚辛不愈加於甲乙甲乙不死持於丙丁起於戊己脾病者日昳慧日出甚下晡靜脾欲緩急食甘以緩之用苦瀉之甘補之又云脾病者身重善飢足痿足不能行行善瘈腳下痛虛則腹滿腸鳴飧泄食不化取其經太陰陽明少陰血者經脈別論食氣入胃散精於肝淫氣於筋食氣入胃濁氣歸心淫精於脈脈氣流經經氣歸於肺肺朝百脈輸精於皮毛毛脈合精行氣於腑腑精神明留於四臟氣歸於權衡權衡以平氣口成寸以決死生飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也五常政大論有太過不及太過者薄所不勝乘所勝也不及者至而不至是為不及所勝妄行所生受病所不勝者乘之也仲景云人受氣於水谷以養神水穀盡而神去故云安穀則昌絕谷則亡水去則營散谷消則衛亡營散衛亡神無所依又云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫血溫衛和營衛乃行得盡天年
